services:
  compcraft:
    build:
      context: .
      dockerfile: Dockerfile
    image: compcraft:latest
    container_name: compcraft
    ports:
      - "8080:80"
    volumes:
      - compcraft_mysql:/var/lib/mysql
    environment:
      SESSION_SECRET: "local_session_secret_change_me"
      JWT_ACCESS_SECRET: "local_access_secret_change_me"
      JWT_REFRESH_SECRET: "local_refresh_secret_change_me"
      FRONTEND_ORIGIN: "http://localhost:8080"

volumes:
  compcraft_mysql:
